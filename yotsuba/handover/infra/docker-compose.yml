services:
  openclaw-gateway:
    image: openclaw-surface:local
    env_file:
      - .env
    environment:
      HOME: /sandbox
      TERM: xterm-256color
    volumes:
      - /home/user/.openclaw:/sandbox/.openclaw
    ports:
      - "127.0.0.1:18789:18789"
    init: true
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/node"]
    command: ["/usr/local/lib/node_modules/openclaw/dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
